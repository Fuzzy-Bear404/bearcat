<!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Example</title>
     <script src="https://cdn-tailwindcss.vercel.app?plugins=forms"></script>
    </head>
    <body>
<section class="bg-gray-300">
    <div class="py-8 px-4 mx-auto max-w-screen-xl lg:py-16 lg:px-6 ">
        <div class="mx-auto max-w-screen-sm text-center">
            <h1 class="mb-4 text-7xl mb-24 tracking-tight font-extrabold lg:text-9xl text-white [text-shadow:_2px_2px_4px_rgba(0,0,0,0.5)]">500</h1>
            <p class="mb-4 text-3xl tracking-tight font-bold md:text-4xl text-white [text-shadow:_2px_2px_4px_rgba(0,0,0,0.5)]">Internal Server Error</p>

        <div class="flex justify-center p-6">
            <a class="group relative inline-block focus:ring-3 focus:outline-hidden" href="{% url 'home:index' %}">
                <span
                    class="absolute inset-0 translate-x-1.5 translate-y-1.5 bg-teal-600 transition-transform group-hover:translate-x-0 group-hover:translate-y-0"></span>
                <span
                    class="relative inline-block border-2 border-current px-8 py-3 text-sm font-bold tracking-widest text-black uppercase"
                >Home</span>
            </a>
        </div>
        </div>   
    </div>
</section>
    </body>
  </html>
